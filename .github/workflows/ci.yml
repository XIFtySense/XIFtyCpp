name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xifty-cpp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyCpp
    env:
      XIFTY_CORE_DIR: ${{ github.workspace }}/XIFty
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v4
        with:
          path: XIFtyCpp

      - name: Check out core repo
        uses: actions/checkout@v4
        with:
          repository: XIFtySense/XIFty
          path: XIFty

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFty -> target

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Run example
        run: ./build/xifty_cpp_example
